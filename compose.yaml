services:
  backend:
    build: ./backend
    ports:
      - 8000:8000
    volumes:
      - ./backend:/usr/src/app
    environment:
      - ENV=development

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend